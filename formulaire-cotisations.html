<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>APEE CES EKALI 1 - Enregistrer une cotisation</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #eef2f5;
            padding: 24px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .return-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e9edf2;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            border-left: 5px solid #2e7d32;
            padding-left: 16px;
            margin-bottom: 1.2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #2c5a2e;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            background: white;
        }
        button {
            background: #2e7d32;
            border: none;
            padding: 12px 28px;
            border-radius: 48px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: #1b5e20; transform: translateY(-2px); }
        .btn-secondary {
            background: #2c3e66;
        }
        .btn-outline {
            background: #f4f7fb;
            color: #1e4620;
            border: 1px solid #cbdde6;
        }
        .student-entry {
            background: #f9fbfd;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .remove-student {
            background: #dc2626;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        .add-student {
            margin-top: 10px;
            background: #4b5563;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .alert {
            background: #fef2e8;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        hr { margin: 20px 0; }
        .info-badge {
            background: #eef2ff;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .install-prompt {
            background: #e8f0fe;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="return-link">← Retour à l'accueil</a>
    <div class="card">
        <div class="card-title" id="formTitle">📝 Nouvelle cotisation</div>
        <form id="cotisationForm">
            <div class="form-group">
                <label>Nom du parent / tuteur *</label>
                <input type="text" id="parentNom" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" id="telephone">
            </div>
            <div class="form-group">
                <label>Adresse</label>
                <input type="text" id="adresse">
            </div>

            <label>Élèves (au moins un) *</label>
            <div id="studentsContainer">
                <div class="student-entry" data-index="0">
                    <div class="student-header">
                        <span>Élève 1</span>
                        <button type="button" class="remove-student btn-outline" style="background:#fee2e2;" disabled>Supprimer</button>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Nom complet *" class="student-name" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Classe (ex: 3ème)" class="student-class">
                    </div>
                </div>
            </div>
            <button type="button" id="addStudentBtn" class="add-student">+ Ajouter un élève</button>

            <hr>
            <div class="form-group">
                <label>Montant versé (FCFA) *</label>
                <input type="number" id="montantVerse" step="1" value="0" required>
                <small id="cotisationInfo">Cotisation par élève : </small>
            </div>
            <div class="form-group">
                <label>Reste à payer (calculé automatiquement)</label>
                <input type="number" id="resteAPayer" readonly style="background:#f0f2f5;">
            </div>
            <div class="form-group">
                <label>Date du paiement</label>
                <input type="date" id="datePaiement" value="">
            </div>
            <div class="form-group">
                <label>Observations</label>
                <textarea id="observations" rows="2"></textarea>
            </div>

            <div class="flex-buttons">
                <button type="submit">💾 Enregistrer la cotisation</button>
                <button type="button" id="resetFormBtn" class="btn-outline">🔄 Réinitialiser</button>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-title">📊 Dernières cotisations enregistrées</div>
        <div id="recentPaymentsList" style="max-height: 300px; overflow-y: auto;">
            <p class="info-badge">Aucune donnée pour le moment</p>
        </div>
        <button id="voirBilanBtn" class="btn-secondary" style="margin-top: 15px;">📈 Voir le bilan complet</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. PARAMÈTRES (cotisation, nom association)
    // --------------------------------------------------------------
    let cotisationParEleve = 12500;
    let nomAssociation = "APEE CES D'EKALI 1 - MFOU";

    function chargerParametres() {
        const stored = localStorage.getItem('apee_app_settings');
        if (stored) {
            try {
                const settings = JSON.parse(stored);
                cotisationParEleve = settings.cotisationParEleve || 12500;
                nomAssociation = settings.nomAssociation || "APEE CES D'EKALI 1 - MFOU";
                document.getElementById('formTitle').innerHTML = `📝 ${nomAssociation} - Nouvelle cotisation`;
                const infoSpan = document.getElementById('cotisationInfo');
                if (infoSpan) infoSpan.innerHTML = `Cotisation par élève : ${cotisationParEleve.toLocaleString()} FCFA`;
            } catch(e) {}
        } else {
            document.getElementById('cotisationInfo').innerHTML = `Cotisation par élève : ${cotisationParEleve.toLocaleString()} FCFA`;
        }
    }

    // --------------------------------------------------------------
    // 2. GESTION DES PAIEMENTS
    // --------------------------------------------------------------
    const STORAGE_KEY = 'apee_payments_bilan';
    let studentCount = 1;

    function getPayments() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) { return []; }
        }
        return [];
    }

    function savePayments(payments) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payments));
    }

    function addPayment(payment) {
        const payments = getPayments();
        payments.unshift(payment);
        savePayments(payments);
        displayRecentPayments();
    }

    function computeTotalDue() {
        const studentDivs = document.querySelectorAll('.student-entry');
        return studentDivs.length * cotisationParEleve;
    }

    function updateResteAPayer() {
        const totalDue = computeTotalDue();
        const versement = parseFloat(document.getElementById('montantVerse').value) || 0;
        const reste = Math.max(0, totalDue - versement);
        document.getElementById('resteAPayer').value = reste;
    }

    function bindStudentChanges() {
        const studentDivs = document.querySelectorAll('.student-entry');
        studentDivs.forEach((div, idx) => {
            const removeBtn = div.querySelector('.remove-student');
            if (removeBtn) {
                removeBtn.disabled = (studentDivs.length === 1);
                removeBtn.onclick = () => {
                    if (studentDivs.length > 1) {
                        div.remove();
                        reindexStudents();
                        updateResteAPayer();
                    }
                };
            }
        });
        updateResteAPayer();
    }

    function reindexStudents() {
        const divs = document.querySelectorAll('.student-entry');
        divs.forEach((div, i) => {
            const headerSpan = div.querySelector('.student-header span');
            if (headerSpan) headerSpan.innerText = `Élève ${i+1}`;
        });
        studentCount = divs.length;
        bindStudentChanges();
    }

    // Ajouter un élève
    document.getElementById('addStudentBtn').addEventListener('click', () => {
        const newIndex = document.querySelectorAll('.student-entry').length;
        const template = document.createElement('div');
        template.className = 'student-entry';
        template.setAttribute('data-index', newIndex);
        template.innerHTML = `
            <div class="student-header">
                <span>Élève ${newIndex+1}</span>
                <button type="button" class="remove-student btn-outline" style="background:#fee2e2;">Supprimer</button>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Nom complet *" class="student-name" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Classe (ex: 3ème)" class="student-class">
            </div>
        `;
        document.getElementById('studentsContainer').appendChild(template);
        reindexStudents();
        updateResteAPayer();
    });

    // Écouter changement montant versé
    document.getElementById('montantVerse').addEventListener('input', updateResteAPayer);

    // MutationObserver pour détecter les changements dynamiques
    const observer = new MutationObserver(() => {
        updateResteAPayer();
        bindStudentChanges();
    });
    observer.observe(document.getElementById('studentsContainer'), { childList: true, subtree: true });

    // Initialisation des boutons de suppression
    bindStudentChanges();

    function collectFormData() {
        const parentNom = document.getElementById('parentNom').value.trim();
        if (!parentNom) throw new Error("Nom du parent requis");
        const telephone = document.getElementById('telephone').value.trim();
        const adresse = document.getElementById('adresse').value.trim();
        const students = [];
        const studentDivs = document.querySelectorAll('.student-entry');
        if (studentDivs.length === 0) throw new Error("Au moins un élève");
        for (let div of studentDivs) {
            const name = div.querySelector('.student-name').value.trim();
            if (!name) throw new Error("Nom d'élève manquant");
            const classe = div.querySelector('.student-class').value.trim();
            students.push({ nom: name, classe: classe });
        }
        const montantVerse = parseFloat(document.getElementById('montantVerse').value) || 0;
        const totalDue = students.length * cotisationParEleve;
        const resteAPayer = Math.max(0, totalDue - montantVerse);
        let date = document.getElementById('datePaiement').value;
        if (!date) {
            date = new Date().toISOString().slice(0, 10);
        }
        const observations = document.getElementById('observations').value.trim();
        return {
            id: Date.now(),
            parentNom,
            telephone,
            adresse,
            students,
            montantVerse,
            resteAPayer,
            date: date + " 00:00:00",
            observations
        };
    }

    function displayRecentPayments() {
        const payments = getPayments();
        const recentDiv = document.getElementById('recentPaymentsList');
        if (payments.length === 0) {
            recentDiv.innerHTML = '<p class="info-badge">Aucune cotisation enregistrée</p>';
            return;
        }
        let html = '<ul style="list-style:none; padding:0;">';
        payments.slice(0, 5).forEach(p => {
            const elevesStr = (p.students || []).map(s => s.nom).join(', ');
            html += `<li style="border-bottom:1px solid #e2e8f0; padding: 8px 0;">
                        <strong>${escapeHtml(p.parentNom)}</strong> - ${p.montantVerse.toLocaleString()} FCFA<br>
                        <small>${elevesStr} | ${p.date ? p.date.split(' ')[0] : ''}</small>
                     </li>`;
        });
        html += '</ul>';
        recentDiv.innerHTML = html;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    // Soumission du formulaire
    document.getElementById('cotisationForm').addEventListener('submit', (e) => {
        e.preventDefault();
        try {
            const payment = collectFormData();
            addPayment(payment);
            alert(`Cotisation enregistrée pour ${payment.parentNom} - ${payment.montantVerse.toLocaleString()} FCFA`);
            // Réinitialiser le formulaire (sauf date)
            document.getElementById('cotisationForm').reset();
            document.getElementById('studentsContainer').innerHTML = `
                <div class="student-entry" data-index="0">
                    <div class="student-header">
                        <span>Élève 1</span>
                        <button type="button" class="remove-student btn-outline" style="background:#fee2e2;" disabled>Supprimer</button>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Nom complet *" class="student-name" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Classe (ex: 3ème)" class="student-class">
                    </div>
                </div>
            `;
            document.getElementById('montantVerse').value = '0';
            document.getElementById('datePaiement').value = new Date().toISOString().slice(0,10);
            document.getElementById('observations').value = '';
            bindStudentChanges();
            updateResteAPayer();
        } catch(err) {
            alert("Erreur : " + err.message);
        }
    });

    document.getElementById('resetFormBtn').addEventListener('click', () => {
        document.getElementById('cotisationForm').reset();
        document.getElementById('studentsContainer').innerHTML = `
            <div class="student-entry" data-index="0">
                <div class="student-header">
                    <span>Élève 1</span>
                    <button type="button" class="remove-student btn-outline" style="background:#fee2e2;" disabled>Supprimer</button>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Nom complet *" class="student-name" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Classe (ex: 3ème)" class="student-class">
                </div>
            </div>
        `;
        document.getElementById('montantVerse').value = '0';
        document.getElementById('datePaiement').value = new Date().toISOString().slice(0,10);
        bindStudentChanges();
        updateResteAPayer();
    });

    document.getElementById('voirBilanBtn').addEventListener('click', () => {
        window.location.href = 'bilan-financier.html';
    });

    // Initialisation
    chargerParametres();
    displayRecentPayments();
    document.getElementById('datePaiement').value = new Date().toISOString().slice(0,10);
    updateResteAPayer();

    // --------------------------------------------------------------
    // GESTION DE L'INSTALLATION (PWA)
    // --------------------------------------------------------------
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');

    function isAppInstalled() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    if (isAppInstalled()) {
        installBanner.classList.add('hidden');
    } else {
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const choiceResult = await deferredPrompt.userChoice;
                if (choiceResult.outcome === 'accepted') {
                    installBanner.classList.add('hidden');
                }
                deferredPrompt = null;
            } else {
                alert("L'installation n'est pas disponible sur ce navigateur. Utilisez le menu du navigateur.");
            }
        });
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.error("SW error:", err));
        });
    }
</script>
</body>
</html>
