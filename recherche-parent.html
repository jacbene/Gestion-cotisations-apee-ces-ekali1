<div class="container">

    <!-- Filtrage rapide -->

    <!-- Résultats -->

<script>
    // =============================================
    // PARAMÈTRES (association)
    // =============================================
    const SETTINGS_KEY = 'apee_app_settings';
    
    function getAssociationSettings() {
        const defaults = {
            nomAssociation: "APEE CES D'EKALI 1 - MFOU",
            anneeScolaire: "2025/2026"
        };
        const stored = localStorage.getItem(SETTINGS_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                return {
                    nomAssociation: parsed.nomAssociation || defaults.nomAssociation,
                    anneeScolaire: parsed.anneeScolaire || defaults.anneeScolaire
                };
            } catch(e) { return defaults; }
        }
        return defaults;
    }
    
    // =============================================
    // GESTION DES PAIEMENTS & RECHERCHE
    // =============================================
    
    let allPayments = [];
    let filteredResults = [];
    let currentSearchMode = 'simple'; // simple, advanced, quick
    
    function loadPayments() {
        const stored = localStorage.getItem('apee_payments');
        if (stored) {
            try {
                let raw = JSON.parse(stored);
                if (!Array.isArray(raw)) raw = [];
                allPayments = raw.map(normalizePayment);
            } catch(e) {
                allPayments = [];
            }
        } else {
            allPayments = [];
        }
    }
    
    function normalizePayment(p) {
        return {
            id: p.id || Date.now(),
            parentNom: p.parentNom || p.nomParent || '',
            telephone: p.telephone || '',
            adresse: p.adresse || '',
            students: Array.isArray(p.students) ? p.students : (Array.isArray(p.eleves) ? p.eleves.map(e => ({ nom: e.nom || '', classe: e.classe || e.cl || '' })) : []),
            montantVerse: p.montantVerse || 0,
            resteAPayer: p.resteAPayer ?? p.restePayer ?? 0,
            date: p.date || new Date().toISOString().slice(0, 19).replace('T', ' '),
            observations: p.observations || ''
        };
    }
    
    function formatDateFR(dateStr) {
        if (!dateStr) return '-';
        let d = dateStr.split(' ')[0].split('-');
        return `${d[2]}/${d[1]}/${d[0]}`;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    // =============================================
    // RECHERCHE SIMPLE
    // =============================================
    
    function generateSuggestions(query) {
        if (query.length < 2) {
            document.getElementById('suggestions').style.display = 'none';
            return;
        }
        
        const lowerQuery = query.toLowerCase();
        const uniqueParents = new Map();
        
        allPayments.forEach(p => {
            const key = `${p.parentNom}|${p.telephone}`;
            if (!uniqueParents.has(key)) {
                uniqueParents.set(key, { nom: p.parentNom, telephone: p.telephone });
            }
        });
        
        let matches = [];
        
        // Recherche par parent
        uniqueParents.forEach((parent, key) => {
            if (parent.nom.toLowerCase().includes(lowerQuery)) {
                matches.push({ type: 'parent', nom: parent.nom, tel: parent.telephone });
            }
        });
        
        // Recherche par élève
        const uniqueEleves = new Set();
        allPayments.forEach(p => {
            p.students.forEach(s => {
                if (s.nom.toLowerCase().includes(lowerQuery)) {
                    const key = `${s.nom}|${p.parentNom}`;
                    if (!uniqueEleves.has(key)) {
                        uniqueEleves.add(key);
                        matches.push({ type: 'eleve', nom: s.nom, classe: s.classe, parentNom: p.parentNom });
                    }
                }
            });
        });
        
        const suggestionsDiv = document.getElementById('suggestions');
        if (matches.length === 0) {
            suggestionsDiv.innerHTML = '<div class="suggestion-item" style="color:#999;">Aucun résultat</div>';
            suggestionsDiv.style.display = 'block';
            return;
        }
        
        suggestionsDiv.innerHTML = matches.map((match, idx) => {
            if (match.type === 'parent') {
                return `<div class="suggestion-item" data-index="${idx}" onclick="selectSuggestion('${escapeHtml(match.nom)}', '${escapeHtml(match.tel)}')">
                    👨 <strong>${escapeHtml(match.nom)}</strong> (${escapeHtml(match.tel)})
                </div>`;
            } else {
                return `<div class="suggestion-item" data-index="${idx}" onclick="selectSuggestionEleve('${escapeHtml(match.nom)}', '${escapeHtml(match.parentNom)}')">
                    👧 <strong>${escapeHtml(match.nom)}</strong> - ${escapeHtml(match.classe || 'Classe ?')} (Parent: ${escapeHtml(match.parentNom)})
                </div>`;
            }
        }).join('');
        
        suggestionsDiv.style.display = 'block';
    }
    
    function selectSuggestion(nomParent, telephone) {
        document.getElementById('searchInput').value = nomParent;
        document.getElementById('suggestions').style.display = 'none';
        searchByParent(nomParent, telephone);
    }
    
    function selectSuggestionEleve(nomEleve, nomParent) {
        document.getElementById('searchInput').value = nomEleve;
        document.getElementById('suggestions').style.display = 'none';
        searchByEleve(nomEleve, nomParent);
    }
    
    function searchByParent(nom, tel) {
        filteredResults = allPayments.filter(p => 
            p.parentNom.toLowerCase() === nom.toLowerCase() && 
            p.telephone === tel
        );
        displayParentResults(nom, tel);
    }
    
    function searchByEleve(nomEleve, nomParent) {
        const parentsTrouves = new Map();
        allPayments.forEach(p => {
            if (p.parentNom.toLowerCase() === nomParent.toLowerCase()) {
                const hasEleve = p.students.some(s => s.nom.toLowerCase() === nomEleve.toLowerCase());
                if (hasEleve) {
                    const key = `${p.parentNom}|${p.telephone}`;
                    if (!parentsTrouves.has(key)) {
                        parentsTrouves.set(key, p);
                    }
                }
            }
        });
        
        if (parentsTrouves.size === 0) {
            displayNoResults(`Aucun parent trouvé pour l'élève "${nomEleve}"`);
            return;
        }
        
        displayEleveResults(Array.from(parentsTrouves.values()), nomEleve);
    }
    
    // =============================================
    // RECHERCHE AVANCÉE & FILTRES RAPIDES
    // =============================================
    
    function applyAdvancedFilters() {
        const dateDebut = document.getElementById('filterDateDebut').value;
        const dateFin = document.getElementById('filterDateFin').value;
        const montantMin = parseFloat(document.getElementById('filterMontantMin').value) || 0;
        const montantMax = parseFloat(document.getElementById('filterMontantMax').value) || Infinity;
        const classe = document.getElementById('filterClasse').value.toLowerCase();
        const statut = document.getElementById('filterStatut').value;
        
        const parentMap = new Map();
        
        allPayments.forEach(p => {
            const key = `${p.parentNom}|${p.telephone}`;
            
            // Filtrer par date
            if (dateDebut && p.date && p.date.split(' ')[0] < dateDebut) return;
            if (dateFin && p.date && p.date.split(' ')[0] > dateFin) return;
            
            // Filtrer par montant
            if (p.montantVerse < montantMin || p.montantVerse > montantMax) return;
            
            // Filtrer par classe
            if (classe) {
                const hasClasse = p.students.some(s => s.classe.toLowerCase().includes(classe));
                if (!hasClasse) return;
            }
            
            if (!parentMap.has(key)) {
                parentMap.set(key, { parent: p, transactions: [] });
            }
            parentMap.get(key).transactions.push(p);
        });
        
        // Filtrer par statut
        let results = Array.from(parentMap.values());
        
        if (statut === 'solde') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalDu === totalVerse;
            });
        } else if (statut === 'partiel') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalVerse > 0 && totalVerse < totalDu;
            });
        } else if (statut === 'retard') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalVerse === 0 || (totalVerse > 0 && totalVerse < totalDu);
            });
        }
        
        displayAdvancedResults(results);
    }
    
    function applyQuickFilter(filterType) {
        const parentMap = new Map();
        
        allPayments.forEach(p => {
            const key = `${p.parentNom}|${p.telephone}`;
            if (!parentMap.has(key)) {
                parentMap.set(key, { parent: p, transactions: [] });
            }
            parentMap.get(key).transactions.push(p);
        });
        
        let results = Array.from(parentMap.values());
        
        if (filterType === 'retard') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalVerse < totalDu;
            });
        } else if (filterType === 'partiel') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalVerse > 0 && totalVerse < totalDu;
            });
        } else if (filterType === 'soldes') {
            results = results.filter(item => {
                const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                return totalDu === totalVerse;
            });
        }
        
        displayQuickFilterResults(results, filterType);
    }
    
    // =============================================
    // AFFICHAGE DES RÉSULTATS
    // =============================================
    
    function displayParentResults(nom, tel) {
        if (filteredResults.length === 0) {
            displayNoResults(`Aucune transaction trouvée pour ${nom}`);
            return;
        }
        
        const totalDu = filteredResults.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
        const totalVerse = filteredResults.reduce((s, t) => s + (t.montantVerse || 0), 0);
        const solde = totalDu - totalVerse;
        const allStudents = [];
        filteredResults.forEach(t => {
            if (t.students) allStudents.push(...t.students);
        });
        
        const statut = solde === 0 ? 'solde' : (totalVerse > 0 ? 'partiel' : 'retard');
        const statusBadge = statut === 'solde' ? 
            '<span class="badge badge-solde">✅ Soldé</span>' :
            (statut === 'partiel' ? 
            '<span class="badge badge-partiel">⚠️ Paiement partiel</span>' :
            '<span class="badge badge-retard">❌ En retard</span>');
        
        let html = `
            <div class="card">
                <div class="card-title">👨 Informations du parent</div>
                
                <div class="parent-details">
                    <h3>${escapeHtml(nom)} ${statusBadge}</h3>
                    <div class="detail-item">
                        <span class="detail-label">Téléphone:</span>
                        <span class="detail-value">${escapeHtml(tel)}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Adresse:</span>
                        <span class="detail-value">${escapeHtml(filteredResults[0].adresse || '-')}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Nombre de transactions:</span>
                        <span class="detail-value">${filteredResults.length}</span>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Total versé</div>
                        <div class="stat-value">${totalVerse.toLocaleString()} FCFA</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Total dû</div>
                        <div class="stat-value">${totalDu.toLocaleString()} FCFA</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Solde</div>
                        <div class="stat-value" style="color: ${solde > 0 ? '#dc2626' : '#2e7d32'};">
                            ${solde.toLocaleString()} FCFA
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Élèves</div>
                        <div class="stat-value">${allStudents.length}</div>
                    </div>
                </div>
                
                <h3 style="margin-top: 20px; margin-bottom: 10px;">👧 Élèves inscrits</h3>
                <div style="display: grid; gap: 8px;">
                    ${allStudents.map(s => `
                        <div style="padding: 8px; background: #f8fafd; border-radius: 8px; border-left: 3px solid #2e7d32;">
                            <strong>${escapeHtml(s.nom)}</strong> - Classe: ${escapeHtml(s.classe || '-')}
                        </div>
                    `).join('')}
                </div>
                
                <h3 style="margin-top: 20px; margin-bottom: 10px;">📅 Historique des paiements</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Montant versé</th>
                            <th>Reste à payer</th>
                            <th>Élèves</th>
                            <th>Observations</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredResults.map(t => `
                            <tr>
                                <td>${formatDateFR(t.date)}</td>
                                <td>${(t.montantVerse || 0).toLocaleString()} FCFA</td>
                                <td>${(t.resteAPayer || 0).toLocaleString()} FCFA</td>
                                <td>${t.students?.map(s => s.nom).join(', ') || '-'}</td>
                                <td>${escapeHtml(t.observations || '-')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <div class="action-buttons no-print">
                    <button class="btn-secondary" onclick="imprimerParent('${escapeHtml(nom)}', '${escapeHtml(tel)}')">🖨️ Imprimer la fiche</button>
                    <button class="btn-outline" onclick="exporterParentPDF('${escapeHtml(nom)}', '${escapeHtml(tel)}')">📥 Exporter PDF</button>
                    <button class="btn-outline" onclick="copierInfos('${escapeHtml(nom)}', '${escapeHtml(tel)}')">📋 Copier les infos</button>
                </div>
            </div>
        `;
        
        document.getElementById('resultsContainer').innerHTML = html;
    }
    
    function displayEleveResults(parents, nomEleve) {
        let html = `
            <div class="card">
                <div class="card-title">👧 Résultats pour l'élève: ${escapeHtml(nomEleve)}</div>
                <div class="alert alert-info">
                    ℹ️ ${parents.length} parent(s) trouvé(s) avec cet élève
                </div>
                ${parents.map(p => {
                    const transactions = allPayments.filter(t => t.parentNom === p.parentNom && t.telephone === p.telephone);
                    const totalDu = transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                    const totalVerse = transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                    const solde = totalDu - totalVerse;
                    const statut = solde === 0 ? 'solde' : (totalVerse > 0 ? 'partiel' : 'retard');
                    const statusBadge = statut === 'solde' ? 
                        '<span class="badge badge-solde">✅ Soldé</span>' :
                        (statut === 'partiel' ? 
                        '<span class="badge badge-partiel">⚠️ Paiement partiel</span>' :
                        '<span class="badge badge-retard">❌ En retard</span>');
                    
                    return `
                        <div style="margin-bottom: 20px; padding: 16px; background: #fefef7; border-radius: 12px;">
                            <h3 style="color: #1e4b2e; margin-bottom: 10px;">👨 ${escapeHtml(p.parentNom)} ${statusBadge}</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px;">
                                <div>📞 ${escapeHtml(p.telephone)}</div>
                                <div>💰 Versé: ${totalVerse.toLocaleString()} FCFA</div>
                                <div>📊 Dû: ${totalDu.toLocaleString()} FCFA</div>
                                <div>⚖️ Solde: ${solde.toLocaleString()} FCFA</div>
                            </div>
                            <button class="btn-secondary" onclick="searchByParent('${escapeHtml(p.parentNom)}', '${escapeHtml(p.telephone)}')">Voir détails complets</button>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        document.getElementById('resultsContainer').innerHTML = html;
    }
    
    function displayAdvancedResults(results) {
        if (results.length === 0) {
            displayNoResults('Aucun parent ne correspond à ces critères');
            return;
        }
        
        let html = `
            <div class="card">
                <div class="card-title">📊 Résultats de la recherche avancée</div>
                <div class="alert alert-info">
                    ℹ️ ${results.length} parent(s) trouvé(s)
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Parent</th>
                            <th>Téléphone</th>
                            <th>Total versé</th>
                            <th>Total dû</th>
                            <th>Solde</th>
                            <th>Statut</th>
                            <th>Élèves</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${results.map(item => {
                            const p = item.parent;
                            const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                            const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                            const solde = totalDu - totalVerse;
                            const statut = solde === 0 ? 'solde' : (totalVerse > 0 ? 'partiel' : 'retard');
                            const badge = statut === 'solde' ? 
                                '<span class="badge badge-solde">✅ Soldé</span>' :
                                (statut === 'partiel' ? 
                                '<span class="badge badge-partiel">⚠️ Partiel</span>' :
                                '<span class="badge badge-retard">❌ Retard</span>');
                            
                            return `
                                <tr style="cursor: pointer;" onclick="searchByParent('${escapeHtml(p.parentNom)}', '${escapeHtml(p.telephone)}')">
                                    <td><strong>${escapeHtml(p.parentNom)}</strong></td>
                                    <td>${escapeHtml(p.telephone)}</td>
                                    <td>${totalVerse.toLocaleString()} FCFA</td>
                                    <td>${totalDu.toLocaleString()} FCFA</td>
                                    <td style="color: ${solde > 0 ? '#dc2626' : '#2e7d32'}; font-weight: bold;">${solde.toLocaleString()} FCFA</td>
                                    <td>${badge}</td>
                                    <td>${item.transactions.reduce((s, t) => s + (t.students?.length || 0), 0)} élève(s)</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('resultsContainer').innerHTML = html;
    }
    
    function displayQuickFilterResults(results, filterType) {
        const filterLabels = {
            'retard': '❌ Parents en retard de paiement',
            'partiel': '⚠️ Parents avec paiements partiels',
            'soldes': '✅ Parents ayant soldé leurs cotisations'
        };
        
        if (results.length === 0) {
            displayNoResults(`Aucun parent dans la catégorie: ${filterLabels[filterType]}`);
            return;
        }
        
        let html = `
            <div class="card">
                <div class="card-title">${filterLabels[filterType]}</div>
                <div class="alert alert-warning">
                    ℹ️ ${results.length} parent(s) trouvé(s)
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Parent</th>
                            <th>Téléphone</th>
                            <th>Total versé</th>
                            <th>Total dû</th>
                            <th>Solde</th>
                            <th>Transactions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${results.map(item => {
                            const p = item.parent;
                            const totalDu = item.transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
                            const totalVerse = item.transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
                            const solde = totalDu - totalVerse;
                            
                            return `
                                <tr style="cursor: pointer;" onclick="searchByParent('${escapeHtml(p.parentNom)}', '${escapeHtml(p.telephone)}')">
                                    <td><strong>${escapeHtml(p.parentNom)}</strong></td>
                                    <td>${escapeHtml(p.telephone)}</td>
                                    <td>${totalVerse.toLocaleString()} FCFA</td>
                                    <td>${totalDu.toLocaleString()} FCFA</td>
                                    <td style="color: ${solde > 0 ? '#dc2626' : '#2e7d32'}; font-weight: bold;">${Math.abs(solde).toLocaleString()} FCFA</td>
                                    <td>${item.transactions.length}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('resultsContainer').innerHTML = html;
    }
    
    function displayNoResults(message) {
        document.getElementById('resultsContainer').innerHTML = `
            <div class="card">
                <div class="no-results">
                    <p style="font-size: 1.1rem;">🔍 ${message}</p>
                </div>
            </div>
        `;
    }
    
    // =============================================
    // ACTIONS (impression avec en-tête association)
    // =============================================
    
    function imprimerParent(nom, tel) {
        const transactions = allPayments.filter(p => p.parentNom === nom && p.telephone === tel);
        if (transactions.length === 0) return;
        
        const settings = getAssociationSettings();
        const totalDu = transactions.reduce((s, t) => s + (t.students?.length || 0) * 12500, 0);
        const totalVerse = transactions.reduce((s, t) => s + (t.montantVerse || 0), 0);
        const solde = totalDu - totalVerse;
        const allStudents = [];
        transactions.forEach(t => {
            if (t.students) allStudents.push(...t.students);
        });
        
        const printContent = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Fiche parent - ${escapeHtml(nom)}</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 20px; margin: 1cm; }
                .entete { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
                .entete h1 { color: #1e4b2e; margin-bottom: 5px; }
                .entete p { color: #4a627a; margin: 0; }
                h2 { color: #1e4b2e; border-left: 4px solid #2e7d32; padding-left: 12px; margin-top: 25px; }
                table { border-collapse: collapse; width: 100%; margin: 15px 0; }
                th, td { border: 1px solid #aaa; padding: 8px; text-align: left; vertical-align: top; }
                th { background: #eef2f7; }
                .soldes { background: #f0f7f0; padding: 12px; border-radius: 12px; margin: 20px 0; border-left: 4px solid #2e7d32; }
                .info-parent { margin-bottom: 20px; }
                .info-parent p { margin: 5px 0; }
                .footer { margin-top: 30px; font-size: 0.8em; text-align: center; color: #666; border-top: 1px solid #ccc; padding-top: 10px; }
            </style>
        </head>
        <body>
            <div class="entete">
                <h1>${escapeHtml(settings.nomAssociation)}</h1>
                <p>Année scolaire ${escapeHtml(settings.anneeScolaire)}</p>
                <p>Fiche récapitulative des cotisations</p>
            </div>
            
            <h2>👨 Informations du parent</h2>
            <div class="info-parent">
                <p><strong>Parent :</strong> ${escapeHtml(nom)}</p>
                <p><strong>Téléphone :</strong> ${escapeHtml(tel)}</p>
                <p><strong>Adresse :</strong> ${escapeHtml(transactions[0]?.adresse || '-')}</p>
            </div>
            
            <div class="soldes">
                <strong>💰 Récapitulatif financier</strong><br>
                Nombre d'élèves : ${allStudents.length}<br>
                Total dû : ${totalDu.toLocaleString()} FCFA<br>
                Total versé : ${totalVerse.toLocaleString()} FCFA<br>
                Solde : ${solde > 0 ? solde.toLocaleString() + ' FCFA restant' : 'Soldé'}
            </div>
            
            <h2>👧 Liste des élèves</h2>
            <ul>
                ${allStudents.map(s => `<li>${escapeHtml(s.nom)} (${escapeHtml(s.classe) || 'Classe non précisée'})</li>`).join('')}
            </ul>
            
            <h2>📅 Historique des versements</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Montant versé (FCFA)</th>
                        <th>Reste à payer (FCFA)</th>
                        <th>Observations</th>
                    </tr>
                </thead>
                <tbody>
                    ${transactions.map(t => `
                        <tr>
                            <td>${formatDateFR(t.date)}</td>
                            <td>${(t.montantVerse||0).toLocaleString()}</td>
                            <td>${(t.resteAPayer||0).toLocaleString()}</td>
                            <td>${escapeHtml(t.observations || '-')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            
            <div class="footer">
                Document généré le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}
            </div>
        </body>
        </html>
        `;
        
        const win = window.open();
        win.document.write(printContent);
        win.document.close();
        win.print();
    }
    
    function exporterParentPDF(nom, tel) {
        // Fonction optionnelle – on peut l'améliorer avec html2pdf si nécessaire
        alert("📥 Export PDF : fonctionnalité à venir. Utilisez plutôt l'impression (Ctrl+P) et enregistrez en PDF.");
    }
    
    function copierInfos(nom, tel) {
        const text = `Parent: ${nom}\nTéléphone: ${tel}`;
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Informations copiées !');
        });
    }
    
    // =============================================
    // ÉVÉNEMENTS
    // =============================================
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        generateSuggestions(e.target.value);
    });
    
    document.getElementById('btnRechercheAvancee').addEventListener('click', applyAdvancedFilters);
    document.getElementById('btnResetFilters').addEventListener('click', () => {
        document.getElementById('filterDateDebut').value = '';
        document.getElementById('filterDateFin').value = '';
        document.getElementById('filterMontantMin').value = '';
        document.getElementById('filterMontantMax').value = '';
        document.getElementById('filterClasse').value = '';
        document.getElementById('filterStatut').value = '';
        document.getElementById('resultsContainer').innerHTML = '';
    });
    
    document.getElementById('btnParentsRetard').addEventListener('click', () => applyQuickFilter('retard'));
    document.getElementById('btnParentsPartiel').addEventListener('click', () => applyQuickFilter('partiel'));
    document.getElementById('btnParentsSoldes').addEventListener('click', () => applyQuickFilter('soldes'));
    document.getElementById('btnAfficherTous').addEventListener('click', () => {
        const parentMap = new Map();
        allPayments.forEach(p => {
            const key = `${p.parentNom}|${p.telephone}`;
            if (!parentMap.has(key)) {
                parentMap.set(key, { parent: p, transactions: [] });
            }
            parentMap.get(key).transactions.push(p);
        });
        displayAdvancedResults(Array.from(parentMap.values()));
    });
    
    // =============================================
    // INITIALISATION
    // =============================================
    
    window.addEventListener('load', () => {
        loadPayments();
    });
</script>
</body>
</html>
